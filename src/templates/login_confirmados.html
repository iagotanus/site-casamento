{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow mt-10">
    <h2 class="text-2xl font-semibold text-center mb-4">Acesso restrito</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
            <div class="p-3 mb-2 text-white bg-red-500 rounded">
                {{ msg }}
            </div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <label class="block mb-2">Senha:</label>
        <input type="password" name="senha" required class="w-full border p-2 mb-4">

        <button class="w-full bg-pink-500 hover:bg-pink-600 text-white py-2 rounded-lg">
            Entrar
        </button>
    </form>
</div>

{% endblock %}
