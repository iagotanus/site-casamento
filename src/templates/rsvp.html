{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-semibold text-center mb-4">Confirme sua presença</h2>

<form method="POST" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
    <label class="block mb-2">Seu nome:</label>
    <input type="text" name="nome" required class="w-full border p-2 mb-4">

    <label class="block mb-2">Quantidade de convidados:</label>
    <input type="number" name="convidados" required class="w-full border p-2 mb-4">

    <button type="submit" class="w-full bg-pink-400 text-white py-2 rounded-lg">Confirmar</button>
</form>

<h3 class="text-xl mt-6 mb-2">Confirmações recebidas:</h3>
<ul class="list-disc ml-6">
    {% for c in confirmacoes %}
        <li>{{ c.nome }} - {{ c.convidados }} convidados</li>
    {% endfor %}
</ul>
{% endblock %}
